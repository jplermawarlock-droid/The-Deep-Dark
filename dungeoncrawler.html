<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Dark: Ironclad Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        body { 
            background: #000; color: #00ff41; font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        /* Top HUD Bar */
        #ui-header { 
            position: absolute; top: 15px; width: 90%; max-width: 400px; 
            display: flex; flex-direction: column; gap: 4px; z-index: 5;
        }
        .stats-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; text-shadow: 0 0 5px #00ff41; }
        #fuel-wrap { width: 100%; height: 6px; background: #111; border: 1px solid #333; margin: 4px 0; border-radius: 3px; overflow: hidden; }
        #fuel-bar { height: 100%; background: linear-gradient(90deg, #00441b, #00ff41); width: 100%; transition: width 0.3s; }

        canvas { 
            border: 2px solid #1a1a1a; background: #000; 
            width: 85vw; height: 85vw; max-width: 400px; max-height: 400px; 
            margin-top: 20px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        /* Ergonomic Gamepad */
        #gamepad { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 95%; max-width: 450px; margin-top: 25px; padding: 10px;
        }
        #movement-grid { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px; }
        .ctrl-btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.05); 
            border: 1px solid #222; color: #00ff41; font-size: 24px; 
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .ctrl-btn:active { background: #00ff41; color: #000; transform: scale(0.92); }

        #pulse-btn { 
            width: 90px; height: 90px; border-radius: 50%; background: #001a33; 
            border: 2px solid #00aaff; color: #00aaff; font-weight: bold; font-size: 14px;
            box-shadow: 0 0 10px #00aaff; opacity: 0.3; pointer-events: none; transition: all 0.2s;
        }
        #pulse-btn.ready { opacity: 1; pointer-events: auto; animation: pulse-glow 1.5s infinite; }
        #pulse-btn:active { transform: scale(0.9); background: #00aaff; color: #000; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px #00aaff; } 50% { box-shadow: 0 0 20px #00aaff; } 100% { box-shadow: 0 0 5px #00aaff; } }

        /* Modals */
        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; padding: 20px;
            text-align: center;
        }
        .modal.hidden { display: none; }
        .input-box { background: #000; border: 1px solid #333; color: #00ff41; padding: 14px; margin: 6px; width: 280px; text-align: center; font-family: inherit; font-size: 16px; }
        .primary-btn { background: #00ff41; color: #000; border: none; padding: 14px 30px; cursor: pointer; font-family: inherit; font-weight: bold; margin: 10px; border-radius: 5px; }
        
        #board-container { 
            margin: 15px 0; padding: 10px; border: 1px solid #222; 
            background: rgba(0,255,65,0.02); width: 280px; border-radius: 8px; 
        }

        .leaderboard-entry {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        .leaderboard-rank {
            color: #888;
            width: 20px;
        }

        .leaderboard-name {
            flex: 1;
            text-align: left;
        }

        .leaderboard-score {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="stats-row">
            <div id="disp-name">AUTH_PENDING</div>
            <div id="disp-depth">DEPTH: 1</div>
        </div>
        <div id="fuel-wrap"><div id="fuel-bar"></div></div>
        <div class="stats-row" style="font-size: 10px; color: #888;">
            <div id="sight-txt">TORCH: 100%</div>
            <div id="pulse-count" style="color: #00aaff;">PULSES: 0</div>
        </div>
    </div>

    <canvas id="ctx" width="400" height="400"></canvas>

    <div id="gamepad">
        <div id="movement-grid">
            <div class="ctrl-btn" style="grid-column: 2;" onpointerdown="move(0,-1)">▲</div>
            <div class="ctrl-btn" style="grid-row: 2; grid-column: 1;" onpointerdown="move(-1,0)">◀</div>
            <div class="ctrl-btn" style="grid-row: 2; grid-column: 2;" onpointerdown="move(0,1)">▼</div>
            <div class="ctrl-btn" style="grid-row: 2; grid-column: 3;" onpointerdown="move(1,0)">▶</div>
        </div>
        <div class="action-zone">
            <button id="pulse-btn" onclick="usePulse()">PULSE</button>
        </div>
    </div>

    <div id="start-screen" class="modal">
        <h1 style="color:#ffd700; letter-spacing: 6px; margin-bottom:0;">THE DEEP DARK</h1>
        <p style="font-size: 10px; color: #444; margin-bottom: 20px;">IRONCLAD PATH v2.0</p>
        
        <input type="text" id="user-in" class="input-box" placeholder="USERNAME" maxlength="12">
        <input type="password" id="pass-in" class="input-box" placeholder="ACCESS KEY">
        <button class="primary-btn" onclick="startGame()">INITIALIZE</button>

        <!-- Leaderboard Element -->
        <div id="board-container">
            <h3 style="font-size: 12px; color: #ffd700; margin: 0 0 10px 0; letter-spacing: 2px;">TOP SURVIVORS</h3>
            <div id="board-ui" style="font-size: 11px; color: #00ff41;">
                LOADING DATA...
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="modal hidden">
        <h1 style="color:#ff0033; letter-spacing: 4px;">TERMINATED</h1>
        <p style="font-size: 12px; color: #888; margin: 10px 0;">Session ended</p>
        <div style="border: 1px solid #333; padding: 15px; margin: 15px 0; background: rgba(255,0,51,0.05); width: 280px; border-radius: 8px;">
            <div style="margin: 8px 0; font-size: 13px;">
                <span style="color: #888;">MAX DEPTH:</span>
                <span id="final-depth" style="color: #ffd700; font-weight: bold;">0</span>
            </div>
            <div style="margin: 8px 0; font-size: 13px;">
                <span style="color: #888;">MOVES:</span>
                <span id="final-moves" style="color: #ffd700; font-weight: bold;">0</span>
            </div>
        </div>
        <button class="primary-btn" onclick="returnToMenu()">RETRY</button>
    </div>

<script>
    (function() {
        const c = document.getElementById('ctx');
        const x = c.getContext('2d');
        const sz = 40, mSz = 10;
        const DM_KEY = "dm_75_access";
        const STORAGE_KEY = "deepdark_leaderboard";
        
        let p = {x:1, y:1}, e = {x:8, y:8}, map = [], disc = [];
        let user = "GUEST", depth = 1, rad = 3.8, pulses = 0, pulseActive = false;
        let moveCount = 0;

        // Local Storage Leaderboard Management
        class Leaderboard {
            static load() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : [];
                } catch (err) {
                    console.error("Error loading leaderboard:", err);
                    return [];
                }
            }

            static save(entries) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                } catch (err) {
                    console.error("Error saving leaderboard:", err);
                }
            }

            static addScore(name, score, moves) {
                const entries = this.load();
                entries.push({
                    name: name,
                    score: score,
                    moves: moves,
                    timestamp: new Date().toISOString()
                });
                // Sort by score descending
                entries.sort((a, b) => b.score - a.score);
                // Keep only top 10
                this.save(entries.slice(0, 10));
            }

            static getTopScores(limit = 5) {
                return this.load().slice(0, limit);
            }
        }

        function displayLeaderboard() {
            const scores = Leaderboard.getTopScores(5);
            const boardUi = document.getElementById('board-ui');
            
            if (scores.length === 0) {
                boardUi.innerHTML = "NO SURVIVORS YET";
                return;
            }

            let html = "";
            scores.forEach((entry, idx) => {
                html += `<div class="leaderboard-entry">
                    <span class="leaderboard-rank">#${idx + 1}</span>
                    <span class="leaderboard-name">${entry.name}</span>
                    <span class="leaderboard-score">D:${entry.score}</span>
                </div>`;
            });
            boardUi.innerHTML = html;
        }

        // Initial leaderboard display
        displayLeaderboard();

        function checkPath(startX, startY, endX, endY) {
            let visited = Array.from({length: mSz}, () => Array(mSz).fill(false));
            let queue = [{x: startX, y: startY}];
            visited[startY][startX] = true;
            while(queue.length > 0) {
                let curr = queue.shift();
                if(curr.x === endX && curr.y === endY) return true;
                let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                for(let d of dirs) {
                    let nx = curr.x + d[0], ny = curr.y + d[1];
                    if(nx >= 0 && nx < mSz && ny >= 0 && ny < mSz && map[ny][nx] !== 1 && !visited[ny][nx]) {
                        visited[ny][nx] = true; queue.push({x: nx, y: ny});
                    }
                }
            }
            return false;
        }

        function init() {
            let valid = false;
            while (!valid) {
                map = Array.from({length: mSz}, () => Array(mSz).fill(0));
                for(let i=0; i<mSz; i++) {
                    for(let j=0; j<mSz; j++) {
                        if((j===1 && i===1) || (j===8 && i===8)) continue;
                        if(Math.random() > 0.74) map[i][j] = 1;
                    }
                }
                map[8][8] = 2;
                if(checkPath(1, 1, 8, 8)) valid = true;
            }
            disc = Array.from({length: mSz}, () => Array(mSz).fill(false));
            p = {x:1, y:1}; 
            let ex, ey;
            do { ex = Math.floor(Math.random()*4+5); ey = Math.floor(Math.random()*4+5); }
            while (map[ey][ex] !== 0 || !checkPath(1,1,ex,ey));
            e = {x:ex, y:ey};
            spawnItem(4);
            if(Math.random() > 0.4) spawnItem(5);
            updateUI();
        }

        function spawnItem(id) {
            let tx, ty, reachable = false, attempts = 0;
            while (!reachable && attempts < 150) {
                tx = Math.floor(Math.random()*8+1);
                ty = Math.floor(Math.random()*8+1);
                if (map[ty][tx] === 0 && !(tx === p.x && ty === p.y)) {
                    if (checkPath(p.x, p.y, tx, ty)) reachable = true;
                }
                attempts++;
            }
            if (reachable) map[ty][tx] = id;
        }

        function updateUI() {
            document.getElementById('disp-depth').innerText = "DEPTH: " + depth;
            document.getElementById('pulse-count').innerText = "PULSES: " + pulses;
            document.getElementById('fuel-bar').style.width = (rad/5 * 100) + "%";
            document.getElementById('sight-txt').innerText = "TORCH: " + Math.max(0, Math.round(rad/5 * 100)) + "%";
            const btn = document.getElementById('pulse-btn');
            if(pulses > 0) btn.classList.add('ready'); else btn.classList.remove('ready');
        }

        window.usePulse = function() {
            if(pulses <= 0 || pulseActive) return;
            pulses--; pulseActive = true;
            for(let i=0; i<mSz; i++) for(let j=0; j<mSz; j++) disc[i][j] = true;
            for(let i=0; i<3; i++) {
                let dx = e.x > p.x ? 1 : -1;
                let dy = e.y > p.y ? 1 : -1;
                if(e.x + dx >= 0 && e.x + dx < mSz && map[e.y][e.x+dx] !== 1) e.x += dx;
                if(e.y + dy >= 0 && e.y + dy < mSz && map[e.y+dy][e.x] !== 1) e.y += dy;
            }
            updateUI();
            setTimeout(() => { pulseActive = false; draw(); }, 2000);
            draw();
        }

        function draw() {
            x.fillStyle = '#000'; x.fillRect(0, 0, 400, 400);
            let themeMain = (user === "DUNGEON MASTER") ? '#ff00ff' : '#00ff41';
            for(let i=0; i<mSz; i++) {
                for(let j=0; j<mSz; j++) {
                    let d = Math.sqrt((j-p.x)**2 + (i-p.y)**2);
                    if(d < rad || pulseActive) disc[i][j] = true;
                    if(d < rad || pulseActive) {
                        x.fillStyle = map[i][j] === 1 ? '#1a1a1a' : '#070707';
                        x.fillRect(j*sz, i*sz, sz, sz);
                        if(map[i][j] === 2) { x.fillStyle = themeMain; x.fillRect(j*sz+10, i*sz+10, 20, 20); }
                        if(map[i][j] === 4) { x.fillStyle = '#ffaa00'; x.beginPath(); x.arc(j*sz+20, i*sz+20, 6, 0, 7); x.fill(); }
                        if(map[i][j] === 5) { x.fillStyle = '#00aaff'; x.beginPath(); x.arc(j*sz+20, i*sz+20, 7, 0, 7); x.fill(); }
                    } else if(disc[i][j]) {
                        x.fillStyle = map[i][j] === 1 ? '#0a0a0a' : '#030303';
                        x.fillRect(j*sz, i*sz, sz, sz);
                    }
                }
            }
            let currentRad = pulseActive ? 15 : rad;
            let g = x.createRadialGradient(p.x*sz+20, p.y*sz+20, 0, p.x*sz+20, p.y*sz+20, currentRad*sz);
            g.addColorStop(0, pulseActive ? 'rgba(0, 170, 255, 0.4)' : 'rgba(0, 255, 65, 0.2)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            x.fillStyle = g; x.fillRect(0,0,400,400);
            x.fillStyle = themeMain; x.shadowBlur = 10; x.shadowColor = themeMain;
            x.fillRect(p.x*sz+12, p.y*sz+12, 16, 16);
            x.shadowBlur = 0;
            let ed = Math.sqrt((e.x-p.x)**2 + (e.y-p.y)**2);
            if(ed < rad || pulseActive) { x.fillStyle = '#ff0033'; x.fillRect(e.x*sz+12, e.y*sz+12, 16, 16); }
        }

        window.move = function(dx, dy) {
            let nx = p.x + dx, ny = p.y + dy;
            if(nx>=0 && nx<mSz && ny>=0 && ny<mSz && map[ny][nx] !== 1) {
                p.x = nx; p.y = ny; moveCount++;
                if(user !== "DUNGEON MASTER") rad -= (0.04 + (depth * 0.007)); 
                if(map[ny][nx] === 4) { rad = Math.min(rad+2.5, 5); map[ny][nx] = 0; }
                if(map[ny][nx] === 5) { pulses++; map[ny][nx] = 0; }
                if(map[ny][nx] === 2) { depth++; init(); }
                if(Math.random() > 0.15 && user !== "DUNGEON MASTER") {
                    let moves = [];
                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
                        let ex = e.x + d[0], ey = e.y + d[1];
                        if(ex>=0 && ex<mSz && ey>=0 && ey<mSz && map[ey][ex] !== 1) {
                            moves.push({x: ex, y: ey, d: Math.sqrt((ex-p.x)**2 + (ey-p.y)**2)});
                        }
                    });
                    if(moves.length > 0) {
                        moves.sort((a,b) => a.d - b.d);
                        e.x = moves[0].x; e.y = moves[0].y;
                    }
                }
                if(e.x === p.x && e.y === p.y && user !== "DUNGEON MASTER") {
                    // Game Over - Save score to local storage
                    if (depth >= 2) {
                        Leaderboard.addScore(user, depth, moveCount);
                        displayLeaderboard();
                    }
                    endGame();
                } else if (rad <= 0 && user !== "DUNGEON MASTER") {
                    // Out of fuel - Game Over
                    endGame();
                }
                updateUI();
                draw();
            }
        }

        function endGame() {
            document.getElementById('final-depth').innerText = depth;
            document.getElementById('final-moves').innerText = moveCount;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        window.startGame = function() {
            let username = document.getElementById('user-in').value || "SURVIVOR";
            let accessKey = document.getElementById('pass-in').value;
            
            if (username.length === 0) {
                alert("INVALID USERNAME");
                return;
            }
            
            user = username;
            if (accessKey === DM_KEY) {
                user = "DUNGEON MASTER";
            }
            
            document.getElementById('disp-name').innerText = user;
            document.getElementById('start-screen').classList.add('hidden');
            
            depth = 1;
            rad = 3.8;
            pulses = 0;
            moveCount = 0;
            pulseActive = false;
            
            init();
            draw();
        }

        window.returnToMenu = function() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('user-in').value = '';
            document.getElementById('pass-in').value = '';
            displayLeaderboard();
        }

        // Initial draw
        draw();
    })();
</script>

</body>
</html>
